[nlp]
lang = "de"
pipeline = ["transformer", "mwt_detector", "mwt_annotator",
            "tagger", "morphologizer", "senter", "sent_type_detector"]

# Tagger and morphologizer are frozen — their outputs (token.pos_
# and token.morph_) are stable symbolic inputs to the senter and
# sent_type_detector. The POS and morph embedding tables inside
# ConcatPOSMorphTagger train freely against these stable inputs.

[components]

[components.transformer]
factory = "transformer"
frozen  = true
source  = "output_stage_b/model-best"

[components.mwt_detector]
factory = "mwt_detector"
frozen  = true
source  = "output_stage_b/model-best"

[components.mwt_annotator]
factory = "mwt_annotator"
frozen  = true
source  = "output_stage_b/model-best"

[components.tagger]
factory = "tagger"
frozen  = true
source  = "output_stage_b/model-best"

[components.morphologizer]
factory = "morphologizer"
frozen  = true
source  = "output_stage_b/model-best"

[components.senter]
factory = "senter"

[components.senter.model]
@architectures = "custom.ConcatPOSMorphTagger.v1"
pos_width    = 32
morph_width  = 64
hidden_width = 128

[components.senter.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0

[components.senter.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[components.sent_type_detector]
factory = "sent_type_detector"

[components.sent_type_detector.model]
@architectures = "custom.ConcatPOSMorphTagger.v1"
pos_width    = 32
morph_width  = 64
hidden_width = 128

[components.sent_type_detector.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0

[components.sent_type_detector.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[paths]
train = "data/train.spacy"
dev   = "data/dev.spacy"

[training]
max_epochs = 20
seed = 42
frozen_components = [
    "transformer", "mwt_detector", "mwt_annotator",
    "tagger", "morphologizer"
]

[training.optimizer]
@optimizers = "Adam.v1"
# Slightly higher LR for Stage C — only senter heads training
learn_rate = 0.0001

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = false
tolerance = 0.2

[training.batcher.size]
@schedules = "compounding.v1"
start    = 100
stop     = 1000
compound = 1.001
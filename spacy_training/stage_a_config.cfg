[nlp]
lang = "de"
pipeline = ["transformer", "mwt_detector"]

[components]

[components.transformer]
factory = "transformer"

[components.transformer.model]
@architectures = "spacy-transformers.TransformerModel.v3"
name = "christinbeck/GHisBERT"
tokenizer_config = {"use_fast": true}

[components.transformer.model.get_spans]
@span_getters = "spacy-transformers.strided_spans.v1"
window = 128
stride = 96

[components.mwt_detector]
factory = "mwt_detector"

[components.mwt_detector.model]
@architectures = "spacy.TextCategorizer.v2"

[components.mwt_detector.model.tok2vec]
@architectures = "spacy-transformers.TransformerListener.v1"
grad_factor = 1.0

[components.mwt_detector.model.tok2vec.pooling]
@layers = "reduce_mean.v1"

[paths]
train = "data/train.spacy"
dev   = "data/dev.spacy"

[training]
max_epochs = 10
seed = 42

[training.optimizer]
@optimizers = "Adam.v1"
learn_rate = 0.00005

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = false
tolerance = 0.2

[training.batcher.size]
@schedules = "compounding.v1"
start    = 100
stop     = 1000
compound = 1.001